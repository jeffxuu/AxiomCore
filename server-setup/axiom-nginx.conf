# Login rate limiting: 5 req/min per IP — strict, protects against brute-force
limit_req_zone $binary_remote_addr zone=axiom_login:10m rate=5r/m;

# ALTCHA challenge rate limiting: 30 req/min per IP — relaxed, allows retries & page refreshes
limit_req_zone $binary_remote_addr zone=axiom_altcha:10m rate=30r/m;

server {
    listen 80;
    listen [::]:80;
    server_name 43.163.116.196;

    root /opt/axiom-core/web/dist;
    index index.html;

    access_log /var/log/nginx/axiom-core.access.log;
    error_log /var/log/nginx/axiom-core.error.log;

    location /api/ {
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-store" always;
        try_files /index.html =404;
    }

    location / {
        add_header Cache-Control "no-store" always;
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name jeffxu.cc www.jeffxu.cc;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name jeffxu.cc www.jeffxu.cc;

    root /opt/axiom-core/web/dist;
    index index.html;

    access_log /var/log/nginx/axiom-core.access.log;
    error_log /var/log/nginx/axiom-core.error.log;

    ssl_certificate /etc/letsencrypt/live/jeffxu.cc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jeffxu.cc/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Login endpoint: strict 5 req/min, burst=2 — brute-force protection
    location = /api/login {
        limit_req zone=axiom_login burst=2 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ALTCHA challenge: relaxed 30 req/min — allows refreshes, retries, component re-init
    location = /api/altcha {
        limit_req zone=axiom_altcha burst=10 nodelay;
        limit_req_status 429;

        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;

        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ALTCHA widget JS — self-hosted, served by FastAPI from node_modules
    location = /altcha.min.js {
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=86400" always;
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-store" always;
        try_files /index.html =404;
    }

    location / {
        add_header Cache-Control "no-store" always;
        try_files $uri $uri/ /index.html;
    }
}
