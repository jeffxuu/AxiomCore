absolute_constraints:
  sleep_red_line: 只要作息仍处于日夜颠倒，所有建议必须优先服务于重置生物钟。
  health_red_line: 若 sleep_quality 为 poor 或 energy_score 连续偏低，禁止高强度力量训练和高强度脑力学习。
  cashflow_red_line: 负债 40000 元且待业期间，任何需要资金投入的学习、商业或健身计划默认冻结。
  job_red_line: 过渡性工作目标是覆盖最低还款线和基本生活成本，不追求完美岗位。
  english_red_line: 英语启蒙必须零成本、低强度、每天 15 分钟，不得挤占求职和作息恢复。

default_mode: survival_mode
