primary_focus:
  name: survival-and-function-rebuild
  objective: 先恢复作息、基础身体机能和现金流生存，再考虑长期技能与业务。
  stage: survival_mode

priority_goals:
  - rank: 1
    goal: 强制重置生物钟，恢复基础身体机能。
  - rank: 2
    goal: 寻找过渡性工作覆盖最低还款线，保证现金流生存。
  - rank: 3
    goal: 每天 15 分钟零成本英语启蒙。

frozen_goals:
  - 所有需要资金投入的商业计划
  - 高强度报班学习
  - 高强度健身
