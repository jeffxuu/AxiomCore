<!doctype html>
<html lang="zh-CN" data-theme="dark" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#08090b" />
    <meta name="color-scheme" content="dark" />
    <title>Axiom Core</title>
    <style>
      html, body { background: #08090b; }
      body { margin: 0; color: #ececef; font-family: "Inter Variable", "SF Pro Display", system-ui, sans-serif; }
    </style>
  </head>
  <body>
    <script>
      (function () {
        try { localStorage.setItem('axiom-theme', 'dark'); } catch (_) {}
        document.documentElement.setAttribute('data-theme', 'dark');
        document.documentElement.classList.add('dark');
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
